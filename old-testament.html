<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta http-equiv="X-UA-Compatible" content="ie=edge">
        <meta name="description" content="A simple reference guide to the structure of the Bible, including the number of books, chapters, verses, and authors.">

        <title>Old Testament | Bible Reference App</title>
        
        <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="css/style.css">
    </head>
    <body>
        
        <header>
            <h1>Old Testament</h1>
            <nav>
                <a href="index.html">Home</a>
                <a href="old-testament.html">Old Testament</a>
                <a href="new-testament.html">New Testament</a>
                <a href="facts.html">Bible Facts</a>
                <a href="languages.html">Languages</a>
                <a href="history.html">History</a>
            </nav>
        </header>

        <!-- HERO -->
        <section class="hero">
            <h2>Categories of the Old Testament</h2>
        </section>

        <!-- CATEGORY CARDS -->
        <section class="stats">
            <div class="card">
                <h2>Law</h2>
                <p>5 Books</p>
            </div>

            <div class="card">
                <h2>History</h2>
                <p>12 Books</p>
            </div>

            <div class="card">  
                <h2>Poetry</h2>
                <p>5 Books</p>
            </div>

            <div class="card">
                <h2>Major Prophets</h2>
                <p>5 Books</p>
            </div>

            <div class="card">
                <h2>Minor Prophets</h2>
                <p>12 Books</p>
            </div>
        </section>
        
        <div style="text-align:center; margin-top:20px;">
            <select id="languageSelect" style="padding:10px; border-radius:5px;">
                    <option value="english">English</option>
                    <option value="telugu">Telugu</option>
                    <option value="hindi">Hindi</option>
                    <option value="tamil">Tamil</option>
                    <option value="malayalam">Malayalam</option>
                    <option value="kannada">Kannada</option>
            </select>
        </div>

        <!-- 🔍 SEARCH BAR -->
        <div style="text-align:center; margin-top:20px;">
            <input type="text" id="searchInput" placeholder="Search Bible Book..." style="padding:10px; width:250px; border-radius:5px; border:1px solid #ccc;">
        </div>

        <!-- 📚 FILTER BUTTONS -->
        <div style="text-align:center; margin:20px;">
            <button class="filter-btn" data-category="All">All</button>
            <button class="filter-btn" data-category="Law">Law</button>
            <button class="filter-btn" data-category="History">History</button>
            <button class="filter-btn" data-category="Poetry">Poetry</button>
            <button class="filter-btn" data-category="Major Prophets">Major Prophets</button>
            <button class="filter-btn" data-category="Minor Prophets">Minor Prophets</button>
        </div>

        <!-- 📖 DYNAMIC BOOKS -->
        <section class="stats" id="booksContainer" data-testament="Old Testament"></section>

        <!-- JS FILES -->
        <script src="js/data.js"></script>
        <script src="js/script.js"></script>

            </div>
        </footer>
    </body>
</html>
