<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>New Testament | Bible Reference App</title>
    <link rel="stylesheet" href="css/style.css">
  </head>

  <body>

    <header>
      <h1>New Testament</h1>
      <nav>
        <a href="index.html">Home</a>
        <a href="old-testament.html">Old Testament</a>
        <a href="new-testament.html">New Testament</a>
        <a href="facts.html">Bible Facts</a>
        <a href="languages.html">Languages</a>
      </nav>
    </header>

    <!-- HERO -->
    <section class="hero">
        <h2>Categories of the New Testament</h2>
    </section>

    <!-- CATEGORY CARDS -->
    <section class="stats">
      <div class="card">
        <h2>Gospels</h2>
        <p>4 Books</p>
      </div>

      <div class="card">
        <h2>History</h2>
        <p>1 Book</p>
      </div>

      <div class="card">
        <h2>Pauline Epistles</h2>
        <p>13 Books</p>
      </div>

      <div class="card">
        <h2>General Epistles</h2>
        <p>8 Books</p>
      </div>

      <div class="card">
        <h2>Prophecy</h2>
        <p>1 Book</p>
      </div>
    </section>

    <div style="text-align:center; margin-top:20px;">
      <select id="languageSelect" style="padding:10px; border-radius:5px;">
        <option value="english">English</option>
        <option value="telugu">Telugu</option>
        <option value="hindi">Hindi</option>
        <option value="tamil">Tamil</option>
        <option value="malayalam">Malayalam</option>
        <option value="kannada">Kannada</option>
      </select>
    </div>


    <!-- 🔍 SEARCH BAR -->
    <div style="text-align: center; margin-top: 20px;">
      <input type="text" id="searchInput" placeholder="Search Bible Book..." style="padding: 10px; width: 250px; border-radius: 5px; border: 1px solid #ccc;">
    </div>

    <!-- 📚 FILTER BUTTONS -->
     <div style="text-align:center; margin:20px;">
        <button class="filter-btn" data-category="All">All</button>
        <button class="filter-btn" data-category="Gospels">Gospels</button>
        <button class="filter-btn" data-category="History">History</button>
        <button class="filter-btn" data-category="Pauline Epistles">Pauline Epistles</button>
        <button class="filter-btn" data-category="General Epistles">General Epistles</button>
        <button class="filter-btn" data-category="Prophecy">Prophecy</button>
      </div>

    <!-- 📖 DYNAMIC BOOKS -->
    <section class="stats" id="booksContainer" data-testament="New Testament"></section>
    
    <!-- JS FILES -->
    <script src="js/data.js"></script>
    <script src="js/script.js"></script>
  </body>
</html>
